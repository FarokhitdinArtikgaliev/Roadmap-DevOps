version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"

  redis:
    image: redis:latest
    container_name: redis

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: devops

volumes:
  postgres-data: